name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  create-tag:
    name: Create Tag & Release
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'chore(release):') || github.event_name == 'workflow_dispatch'
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      created: ${{ steps.check-tag.outputs.created }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Extract version from Cargo.toml
        id: version
        run: |
          VERSION="$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')"
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION, Tag: $TAG"

      - name: Check if tag already exists
        id: check-tag
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists, skipping."
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.check-tag.outputs.created == 'true'
        run: |
          git tag -a "${{ steps.version.outputs.tag }}" -m "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Install git-cliff
        if: steps.check-tag.outputs.created == 'true'
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Generate release notes
        if: steps.check-tag.outputs.created == 'true'
        id: release-notes
        run: |
          NOTES=$(git-cliff --latest --strip header 2>/dev/null || echo "Release ${{ steps.version.outputs.tag }}")
          {
            echo "notes<<EOF"
            echo "$NOTES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check-tag.outputs.created == 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.release-notes.outputs.notes }}

  publish-crate:
    name: Publish to crates.io
    needs: create-tag
    if: needs.create-tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish crate
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    needs: create-tag
    if: needs.create-tag.outputs.created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: unity-cli-linux-x64
            binary: unity-cli
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: unity-cli-linux-arm64
            binary: unity-cli
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: unity-cli-osx-arm64
            binary: unity-cli
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: unity-cli-win-x64
            binary: unity-cli.exe
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-tag.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-build-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'aarch64-linux-gnu-gcc' || '' }}

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  build-lsp:
    name: Build LSP (${{ matrix.rid }})
    needs: create-tag
    if: needs.create-tag.outputs.created == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            artifact: csharp-lsp-linux-x64
          - rid: linux-arm64
            os: ubuntu-latest
            artifact: csharp-lsp-linux-arm64
          - rid: osx-arm64
            os: macos-latest
            artifact: csharp-lsp-osx-arm64
          - rid: win-x64
            os: windows-latest
            artifact: csharp-lsp-win-x64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.create-tag.outputs.tag }}

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Publish LSP server
        run: >
          dotnet publish lsp/Server.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: cp lsp/bin/Release/net10.0/${{ matrix.rid }}/publish/Server ${{ matrix.artifact }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: Copy-Item "lsp/bin/Release/net10.0/${{ matrix.rid }}/publish/Server.exe" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}
          retention-days: 1

  upload-release:
    name: Upload Release Assets
    needs: [create-tag, build, build-lsp]
    if: needs.create-tag.outputs.created == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Generate managed binary manifests
        env:
          TAG: ${{ needs.create-tag.outputs.tag }}
          VERSION: ${{ needs.create-tag.outputs.version }}
          REPO: ${{ github.repository }}
        run: |
          generate_manifest() {
            prefix="$1"
            output="$2"
            manifest="{\"version\":\"${VERSION}\",\"assets\":{"
            first=true
            for file in artifacts/${prefix}-*/${prefix}-*; do
              name="$(basename "$file")"
              rid="${name#${prefix}-}"
              sha="$(sha256sum "$file" | cut -d' ' -f1)"
              url="https://github.com/${REPO}/releases/download/${TAG}/${name}"
              if [ "$first" = true ]; then first=false; else manifest="${manifest},"; fi
              manifest="${manifest}\"${rid}\":{\"url\":\"${url}\",\"sha256\":\"${sha}\"}"
            done
            manifest="${manifest}}}"
            echo "$manifest" | python3 -m json.tool > "artifacts/${output}"
            echo "Generated ${output}:"
            cat "artifacts/${output}"
          }

          generate_manifest "unity-cli" "unity-cli-manifest.json"
          generate_manifest "csharp-lsp" "csharp-lsp-manifest.json"

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.create-tag.outputs.tag }}
          files: |
            artifacts/unity-cli-linux-x64/unity-cli-linux-x64
            artifacts/unity-cli-linux-arm64/unity-cli-linux-arm64
            artifacts/unity-cli-osx-arm64/unity-cli-osx-arm64
            artifacts/unity-cli-win-x64/unity-cli-win-x64
            artifacts/unity-cli-manifest.json
            artifacts/csharp-lsp-linux-x64/csharp-lsp-linux-x64
            artifacts/csharp-lsp-linux-arm64/csharp-lsp-linux-arm64
            artifacts/csharp-lsp-osx-arm64/csharp-lsp-osx-arm64
            artifacts/csharp-lsp-win-x64/csharp-lsp-win-x64
            artifacts/csharp-lsp-manifest.json
