name: Lint

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  rust:
    name: Rust Format & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  skill-contract:
    name: Skill Contract Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-skill-lint-${{ hashFiles('**/Cargo.lock') }}
      - name: Run unity-cli skills lint
        run: cargo run --quiet -- skills lint --severity error --format text
      - name: Emit JSON report
        if: always()
        run: |
          mkdir -p .unity/skill-eval
          cargo run --quiet -- skills lint --severity warning --format json \
            > .unity/skill-eval/skill-static-report.json || true
      - name: Upload contract report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: skill-static-report
          path: .unity/skill-eval/skill-static-report.json
          retention-days: 14

  docs:
    name: Markdown & Commitlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          run_install: false
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run Markdownlint
        run: >
          pnpm exec markdownlint
          README.md
          CONTRIBUTING.md
          CLAUDE.md
          RELEASE.md
          docs/README.md
          docs/configuration.md
          docs/development.md
          docs/tools.md
          docs/benchmark-results.md
          docs/benchmark-results.ja.md
          docs/troubleshooting/README.md
          docs/troubleshooting/capabilities-none.md
          UnityCliBridge/Packages/unity-cli-bridge/**/*.md
          .github/workflows/README.md
          --config .markdownlint.json
          --ignore-path .markdownlintignore
      - name: Validate commit messages
        if: >-
          github.event_name == 'pull_request'
          && github.event.pull_request.base.ref != 'main'
        run: >
          pnpm exec commitlint
          --from ${{ github.event.pull_request.base.sha }}
          --to ${{ github.event.pull_request.head.sha }}
          --verbose
