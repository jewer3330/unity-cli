name: Test

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [develop, "feature/**"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-test:
    name: Rust Tests (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run cargo test
        run: cargo test

  lsp-test:
    name: LSP Tests (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run dotnet test
        run: dotnet test lsp/Server.Tests.csproj

  rust-coverage:
    name: Rust Coverage >= 90% (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Rust coverage gate
        run: |
          mkdir -p coverage/rust
          cargo llvm-cov \
            --all-targets \
            --cobertura \
            --output-path coverage/rust/cobertura.xml \
            --fail-under-lines 90

      - name: Upload Rust coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/rust/cobertura.xml
          flags: rust
          name: rust-coverage
          fail_ci_if_error: true
          verbose: true

  lsp-coverage:
    name: LSP Coverage >= 90% (required)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Run LSP coverage gate
        run: |
          dotnet test lsp/Server.Tests.csproj \
            /p:CollectCoverage=true \
            /p:CoverletOutputFormat=cobertura \
            /p:Threshold=90 \
            /p:ThresholdType=line \
            /p:ThresholdStat=total

      - name: Upload LSP coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lsp/coverage.cobertura.xml
          flags: lsp
          name: lsp-coverage
          fail_ci_if_error: true
          verbose: true

  lsp-perf:
    name: LSP Performance (required)
    runs-on: ubuntu-latest
    if: >-
      !(
        github.event_name == 'push'
        && github.ref == 'refs/heads/main'
        && contains(github.event.head_commit.message, 'chore(release):')
      )
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup .NET SDK 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Cache cargo registry and build
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install perf dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y jq
          python3 -m pip install tiktoken

      - name: Build unity-cli
        run: cargo build --release

      - name: Publish local LSP binary for perf run
        run: |
          export UNITY_CLI_TOOLS_ROOT="$PWD/.cache/csharp-lsp"
          export LSP_INSTALL_DIR="$UNITY_CLI_TOOLS_ROOT/csharp-lsp/linux-x64"
          mkdir -p "$LSP_INSTALL_DIR"
          dotnet publish lsp/Server.csproj -c Release -o "$LSP_INSTALL_DIR"
          cp "$LSP_INSTALL_DIR/Server" "$LSP_INSTALL_DIR/server"
          chmod +x "$LSP_INSTALL_DIR/server"
          printf 'local-perf\n' > "$LSP_INSTALL_DIR/VERSION"

      - name: Run LSP performance check
        env:
          UNITY_CLI_TOOLS_ROOT: ${{ github.workspace }}/.cache/csharp-lsp
          UNITY_CLI_TEST_SKIP_MANAGED_UPDATE: "1"
        run: |
          mkdir -p artifacts
          ./scripts/lsp-perf-check.sh --unity-cli ./target/release/unity-cli --project-root ./UnityCliBridge --json | tee artifacts/lsp-perf-summary.json
          cp .unity/perf/lsp-history.jsonl artifacts/lsp-history.jsonl

      - name: Upload LSP perf artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lsp-perf-history
          path: |
            artifacts/lsp-perf-summary.json
            artifacts/lsp-history.jsonl
          retention-days: 30
